<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#172033"><meta name="apple-mobile-web-app-capable" content="yes"><link rel="manifest" href="./manifest.webmanifest"><link rel="apple-touch-icon" href="./icon-192.png"><title>現場調査チェックリスト</title><style>
:root{--n:#172033;--b:#2563eb;--g:#059669;--r:#dc2626;--bg:#eef1f5;--line:#d8dde6}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:#111827}.top{position:sticky;top:0;z-index:20;background:var(--n);color:#fff;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}.top h1{font-size:18px;margin:0}.top small{opacity:.75}main{max-width:920px;margin:auto;padding:12px}.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 5px #0002}.card h2{font-size:17px;margin:0 0 12px;border-left:5px solid var(--b);padding-left:8px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}label{display:block;font-size:13px;font-weight:700;margin:0 0 5px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:16px;background:#fff}textarea{min-height:78px}.check{display:grid;grid-template-columns:24px 1fr 110px;gap:8px;align-items:center;border:1px solid #e6e8ee;border-radius:10px;padding:8px;margin-bottom:7px}.check input{width:21px;height:21px}.check select{padding:7px;font-size:14px}.photo{border:1px dashed #9aa4b2;border-radius:12px;padding:10px;margin:10px 0}.preview{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}.preview img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:8px;border:1px solid #ddd}.actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:16px 0 26px}button{border:0;border-radius:11px;padding:12px 10px;font-weight:700;font-size:15px}.primary{background:var(--b);color:#fff}.secondary{background:#475467;color:#fff}.success{background:var(--g);color:#fff}.danger{background:var(--r);color:#fff}.light{background:#fff;color:#111}.hidden{display:none!important}.status{text-align:center;color:#667085;font-size:13px;min-height:20px}.logo-preview img{max-width:220px;max-height:80px;object-fit:contain}#report{background:#fff;min-height:100vh}.report-tools{position:sticky;top:0;z-index:30;background:var(--n);padding:10px;display:flex;gap:8px}.page{max-width:210mm;margin:auto;background:#fff;padding:9mm}.rhead{border-bottom:2px solid #111;padding-bottom:5px;margin-bottom:6px}.rheadtop{display:grid;grid-template-columns:45mm 1fr 45mm;align-items:center;min-height:17mm}.rlogo img{max-width:43mm;max-height:15mm;object-fit:contain}.textlogo small{display:block;font-size:7pt;letter-spacing:.15em}.textlogo strong{font-size:17pt;letter-spacing:.08em}.rtitle{text-align:center;font-size:17pt;font-weight:800;writing-mode:horizontal-tb;text-orientation:mixed;white-space:normal}.project-title{margin:5px 0 4px;padding:6px 8px;border:1.5px solid #111;text-align:center;font-size:13pt;font-weight:800;line-height:1.3;writing-mode:horizontal-tb;text-orientation:mixed;white-space:normal;word-break:break-word}.rcompany{text-align:right;font-size:8pt}.meta{display:grid;grid-template-columns:1fr 1fr;gap:3px 12px;font-size:9pt}.cols{column-count:2;column-gap:6mm}.rsec{break-inside:avoid;border:1px solid #999;margin-bottom:4px;font-size:8.8pt}.rsec h3,.rphotos h3{margin:0;padding:3px 5px;background:#e5e7eb;border-bottom:1px solid #999;font-size:9.5pt}.rrow{display:grid;grid-template-columns:43% 57%;border-bottom:1px solid #ddd;min-height:19px}.rrow:last-child{border-bottom:0}.rl{font-weight:700;background:#fafafa;border-right:1px solid #ddd;padding:2px 4px}.rv{padding:2px 4px;overflow-wrap:anywhere}.rphotos{border:1px solid #999;margin-top:5px}.rpgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2.5mm;padding:2.5mm}.rpgrid figure{margin:0}.rpgrid img{width:100%;height:40mm;object-fit:cover;border:1px solid #aaa}.rpgrid figcaption{text-align:center;font-size:7.5pt}.note{font-size:7pt;color:#555;margin-top:4px}@media(max-width:640px){.grid{grid-template-columns:1fr}.check{grid-template-columns:24px 1fr}.check select{grid-column:2}.actions{grid-template-columns:1fr}.preview{grid-template-columns:repeat(2,1fr)}.cols{column-count:1}.rpgrid{grid-template-columns:1fr}.page{width:100%;padding:12px}.rheadtop{grid-template-columns:1fr;text-align:center;gap:5px}.rlogo{justify-content:center}.rlogo img{object-position:center}.rcompany{text-align:center}.rtitle{font-size:21px}.project-title{font-size:17px}.meta{grid-template-columns:1fr;font-size:13px}.rsec{font-size:13px}.rpgrid img{height:auto;max-height:280px}}@page{size:A4 portrait;margin:8mm}@media print{#form,.report-tools{display:none!important}#report{display:block!important}.page{padding:0;max-width:none}body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style></head><body>
<div id="form"><header class="top"><div><h1>現場調査チェックリスト</h1><small>株式会社ロジック専用 PWA</small></div><button id="install" class="light hidden">インストール</button></header><main><form id="f">
<section class="card"><h2>基本情報</h2><div class="grid"><div class="full"><label for="site">工事件名・現場名</label><input id="site" name="site"></div><div><label for="date">現調日</label><input id="date" name="date" type="date"></div><div><label for="time">開始時間</label><input id="time" name="time" type="time"></div><div><label for="staff">現調担当者</label><input id="staff" name="staff" value="中迫 一斗"></div><div><label for="client">立会者・担当者</label><input id="client" name="client"></div><div class="full"><label for="address">現場住所</label><input id="address" name="address"></div></div></section>
<section class="card"><h2>会社ロゴ</h2><input id="logoFile" type="file" accept="image/png,image/jpeg,image/webp"><div id="logoPrev" class="logo-preview"></div><div class="actions" style="margin-bottom:0"><button type="button" class="primary" onclick="saveLogo()">ロゴを登録</button><button type="button" class="danger" onclick="delLogo()">ロゴを削除</button></div></section>
<section class="card"><h2>駐車条件</h2><div class="grid"><div><label for="parking">駐車方法</label><select id="parking" name="parking"><option value="">未確認</option><option>現場内駐車可（無料）</option><option>施設駐車場（無料）</option><option>施設駐車場（有料）</option><option>近隣コインパーキング</option><option>駐車場なし</option><option>要協議</option></select></div><div><label for="cars">駐車可能台数</label><select id="cars" name="cars"><option value="">未確認</option><option>1台</option><option>2台</option><option>3台</option><option>4台</option><option>5台以上</option></select></div><div><label for="fee">駐車料金（1日・円）</label><input id="fee" name="fee" type="number"></div><div><label for="distance">現場までの距離（m）</label><input id="distance" name="distance" type="number"></div><div class="full"><label for="parkingMemo">駐車備考</label><textarea id="parkingMemo" name="parkingMemo"></textarea></div></div></section>
<section class="card"><h2>作業可能時間・曜日</h2><div class="grid"><div><label for="ws">開始時間</label><input id="ws" name="ws" type="time"></div><div><label for="we">終了時間</label><input id="we" name="we" type="time"></div><div><label for="weekday">平日作業</label><select id="weekday" name="weekday"><option value="">未確認</option><option>作業可能</option><option>条件付きで可能</option><option>作業不可</option></select></div><div><label for="sat">土曜作業</label><select id="sat" name="sat"><option value="">未確認</option><option>作業可能</option><option>条件付きで可能</option><option>作業不可</option></select></div><div><label for="sun">日曜作業</label><select id="sun" name="sun"><option value="">未確認</option><option>作業可能</option><option>条件付きで可能</option><option>作業不可</option></select></div><div><label for="holiday">祝日作業</label><select id="holiday" name="holiday"><option value="">未確認</option><option>作業可能</option><option>条件付きで可能</option><option>作業不可</option></select></div><div class="full"><label for="workMemo">作業条件・不可時間</label><textarea id="workMemo" name="workMemo"></textarea></div></div></section>
<section class="card"><h2>搬入・仮設条件</h2><div class="grid"><div><label for="sideAccess">現場への横付け</label><select id="sideAccess" name="sideAccess"><option value="">未確認</option><option>横付け可能</option><option>時間・車種限定で可能</option><option>横付け不可</option><option>要協議</option></select></div><div><label for="sideDistance">横付け位置から施工場所まで（m）</label><input id="sideDistance" name="sideDistance" type="number"></div><div><label for="elevator">エレベーター</label><select id="elevator" name="elevator"><option value="">未確認</option><option>あり・使用可能</option><option>あり・使用不可</option><option>なし</option><option>要協議</option></select></div><div><label for="floor">階段搬入階</label><input id="floor" name="floor" type="number"></div><div><label for="carry">小運搬距離（m）</label><input id="carry" name="carry" type="number"></div><div><label for="length">最長搬入材長（m）</label><input id="length" name="length" type="number" step="0.1"></div></div><div class="check"><input type="checkbox" name="crane"><span>ラフタークレーンが必要</span><select name="craneStatus"><option value="">未確認</option><option>必要</option><option>不要</option></select></div><div class="check"><input type="checkbox" name="unic"><span>ユニックが必要</span><select name="unicStatus"><option value="">未確認</option><option>必要</option><option>不要</option></select></div><div class="check"><input type="checkbox" name="guard"><span>警備員が必要</span><select name="guardStatus"><option value="">未確認</option><option>必要</option><option>不要</option></select></div><label for="accessMemo">搬入・仮設備考</label><textarea id="accessMemo" name="accessMemo"></textarea></section>
<section class="card"><h2>建築・寸法</h2><div class="grid"><div><label for="ceiling">天井高さ（mm）</label><input id="ceiling" name="ceiling" type="number"></div><div><label for="void">天井ふところ（mm）</label><input id="void" name="void" type="number"></div><div><label for="fa">床面積（㎡）</label><input id="fa" name="fa" type="number" step="0.01"></div><div><label for="wa">壁面積（㎡）</label><input id="wa" name="wa" type="number" step="0.01"></div><div class="full"><label for="buildingMemo">既存下地・損傷・納まり</label><textarea id="buildingMemo" name="buildingMemo"></textarea></div></div></section>
<section class="card"><h2>電源・水・処分条件</h2><div class="grid"><div><label for="powerSupply">工事用電源</label><select id="powerSupply" name="powerSupply"><option value="">未確認</option><option>施設から支給</option><option>施工者で準備</option><option>使用不可</option><option>要協議</option></select></div><div><label for="breaker">ブレーカー</label><select id="breaker" name="breaker"><option value="">未確認</option><option>必須</option><option>不要</option><option>施工者で準備</option><option>施設側で準備</option><option>要協議</option></select></div><div class="full"><label for="powerMemo">電源備考</label><textarea id="powerMemo" name="powerMemo" placeholder="例：100Vのみ、漏電ブレーカー必須、分電盤から仮設電源を取る"></textarea></div><div><label for="waterSupply">工事用水</label><select id="waterSupply" name="waterSupply"><option value="">未確認</option><option>施設から支給</option><option>施工者で準備</option><option>使用不可</option><option>要協議</option></select></div><div><label for="disposal">廃材・産廃処分</label><select id="disposal" name="disposal"><option value="">未確認</option><option>工事費に含む</option><option>別途工事</option><option>発注者処分</option><option>施工者処分</option><option>要協議</option></select></div><div class="full"><label for="utilityMemo">水・処分備考</label><textarea id="utilityMemo" name="utilityMemo" placeholder="例：散水用水栓のみ使用可、処分費は別途、場内集積まで施工範囲"></textarea></div></div></section><section class="card"><h2>設備・安全</h2><div class="check"><input type="checkbox" name="electrical"><span>100V電源供給あり</span><select name="electricalStatus"><option value="">未確認</option><option>問題なし</option><option>要協議</option></select></div><div class="check"><input type="checkbox" name="plumbing"><span>水道を支給あり</span><select name="plumbingStatus"><option value="">未確認</option><option>問題なし</option><option>要協議</option></select></div><div class="check"><input type="checkbox" name="third"><span>利用者・児童・第三者動線</span><select name="thirdStatus"><option value="">未確認</option><option>分離可能</option><option>要対策</option></select></div><div class="check"><input type="checkbox" name="waste"><span>道具車現場横づけ可能</span><select name="wasteStatus"><option value="">未確認</option><option>確認済</option><option>要協議</option></select></div><label for="safetyMemo">設備・安全備考</label><textarea id="safetyMemo" name="safetyMemo"></textarea></section>
<section class="card"><h2>協議事項・見積条件</h2><label for="questions">確認事項</label><textarea id="questions" name="questions"></textarea><label for="estimate">見積に反映する項目</label><textarea id="estimate" name="estimate"></textarea><label for="memo">総合メモ</label><textarea id="memo" name="memo"></textarea></section>
<section class="card"><h2>写真</h2><div id="photoAreas"></div><p style="font-size:12px;color:#667085">各箇所ごとに撮影・保存できます。報告書には各項目の代表1枚、最大6枚を表示します。</p></section>
<div id="status" class="status"></div><div class="actions"><button type="button" class="primary" onclick="saveAll()">入力・写真を保存</button><button type="button" class="secondary" onclick="loadAll(true)">保存内容を読込</button><button type="button" class="success" onclick="showReport()">簡潔報告書を表示</button><button type="button" class="secondary" onclick="csv()">CSV出力</button><button type="button" class="danger" onclick="clearAll()">全データを消去</button></div></form></main></div>
<div id="report" class="hidden"><div class="report-tools"><button class="primary" onclick="window.print()">PDF保存・印刷</button><button class="light" onclick="back()">入力画面へ戻る</button></div><div id="page" class="page"></div></div>
<script>
const form=document.getElementById('f'),statusEl=document.getElementById('status'),DB='logicClean',STORE='s';let pending={},deferred=null;const photos=[['overview','現場全景'],['access','搬入・搬出経路'],['parkingPhoto','駐車場所・車両進入口'],['ceilingPhoto','天井・天井裏'],['wallPhoto','壁・開口部'],['floorPhoto','床・床下'],['electricalPhoto','照明・電気設備'],['plumbingPhoto','配管・衛生設備'],['damage','既存不良・損傷箇所'],['measurement','寸法確認写真']];
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('date').value=new Date().toISOString().slice(0,10);buildPhotos();loadAll(false);loadLogo()});window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferred=e;document.getElementById('install').classList.remove('hidden')});document.getElementById('install').onclick=async()=>{if(deferred){deferred.prompt();await deferred.userChoice;deferred=null}};if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,1);r.onupgradeneeded=()=>r.result.createObjectStore(STORE);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}async function put(k,v){const db=await openDB();return new Promise((res,rej)=>{const t=db.transaction(STORE,'readwrite');t.objectStore(STORE).put(v,k);t.oncomplete=res;t.onerror=()=>rej(t.error)})}async function get(k){const db=await openDB();return new Promise((res,rej)=>{const t=db.transaction(STORE,'readonly'),r=t.objectStore(STORE).get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}async function del(k){const db=await openDB();return new Promise((res,rej)=>{const t=db.transaction(STORE,'readwrite');t.objectStore(STORE).delete(k);t.oncomplete=res;t.onerror=()=>rej(t.error)})}function msg(t){statusEl.textContent=t;setTimeout(()=>statusEl.textContent='',3500)}
function buildPhotos(){const c=document.getElementById('photoAreas');photos.forEach(([id,title])=>{c.insertAdjacentHTML('beforeend',`<div class="photo"><label>${title}</label><input id="p_${id}" type="file" accept="image/*" capture="environment" multiple><div id="pv_${id}" class="preview"></div><textarea name="pm_${id}" placeholder="${title}のメモ"></textarea></div>`);document.getElementById('p_'+id).onchange=e=>preview(id,[...e.target.files])})}async function resize(file){return new Promise((res,rej)=>{const i=new Image,r=new FileReader;r.onload=()=>i.src=r.result;r.onerror=rej;i.onload=()=>{const m=1400,s=Math.min(1,m/Math.max(i.width,i.height)),c=document.createElement('canvas');c.width=Math.round(i.width*s);c.height=Math.round(i.height*s);c.getContext('2d').drawImage(i,0,0,c.width,c.height);res({name:file.name,dataUrl:c.toDataURL('image/jpeg',.78)})};r.readAsDataURL(file)})}async function preview(id,files){pending[id]=await Promise.all(files.map(resize));render(id,pending[id])}function render(id,list){document.getElementById('pv_'+id).innerHTML=(list||[]).map(x=>`<img src="${x.dataUrl}">`).join('')}
function collect(){const d={};new FormData(form).forEach((v,k)=>d[k]=v);form.querySelectorAll('input[type=checkbox]').forEach(x=>d[x.name]=x.checked);return d}function apply(d){Object.entries(d||{}).forEach(([k,v])=>{const e=form.elements[k];if(!e)return;e.type==='checkbox'?e.checked=!!v:e.value=v})}async function saveAll(){try{msg('保存中…');await put('form',collect());for(const[id]of photos){let l=pending[id];if(!l)l=await get('ph_'+id)||[];await put('ph_'+id,l)}msg('保存しました')}catch(e){msg('保存できませんでした。写真枚数を減らしてください')}}async function loadAll(show=true){const d=await get('form');if(d)apply(d);for(const[id]of photos){const l=await get('ph_'+id)||[];pending[id]=l;render(id,l)}if(show)msg(d?'読み込みました':'保存データはありません')}async function clearAll(){if(!confirm('すべて消去しますか？'))return;form.reset();document.getElementById('date').value=new Date().toISOString().slice(0,10);await del('form');await del('logo');for(const[id]of photos){await del('ph_'+id);pending[id]=[];render(id,[])}document.getElementById('logoPrev').innerHTML='';msg('消去しました')}
function fileData(f){return new Promise((res,rej)=>{const r=new FileReader;r.onload=()=>res({name:f.name,dataUrl:r.result});r.onerror=rej;r.readAsDataURL(f)})}async function saveLogo(){const f=document.getElementById('logoFile').files[0];if(!f)return msg('ロゴを選択してください');const x=await fileData(f);await put('logo',x);showLogo(x);msg('ロゴを登録しました')}async function loadLogo(){const x=await get('logo');if(x)showLogo(x)}function showLogo(x){document.getElementById('logoPrev').innerHTML=`<img src="${x.dataUrl}">`}async function delLogo(){await del('logo');document.getElementById('logoPrev').innerHTML='';msg('ロゴを削除しました')}
function meaningful(v){return v!==undefined&&v!==null&&!['','未確認','未撮影','該当なし'].includes(String(v).trim())}function label(e){if(e.id){const l=document.querySelector(`label[for="${e.id}"]`);if(l)return l.textContent.trim()}const c=e.closest('.check');if(c&&c.querySelector('span'))return c.querySelector('span').textContent.trim();return e.name}function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
async function showReport(){await saveAll();const secs=[];document.querySelectorAll('#f>.card').forEach(sec=>{const h=sec.querySelector('h2');if(!h||['会社ロゴ','写真'].includes(h.textContent.trim()))return;const rows=[],used=new Set;sec.querySelectorAll('input,select,textarea').forEach(e=>{if(!e.name||used.has(e.name)||e.type==='file')return;used.add(e.name);if(e.type==='checkbox'){if(e.checked)rows.push([label(e),'該当・確認済'])}else if(meaningful(e.value))rows.push([label(e),e.value])});if(rows.length)secs.push([h.textContent.trim(),rows])});let sh='';secs.forEach(([t,rows])=>{sh+=`<section class="rsec"><h3>${esc(t)}</h3>`;rows.forEach(([l,v])=>sh+=`<div class="rrow"><div class="rl">${esc(l)}</div><div class="rv">${esc(v).replace(/\n/g,'<br>')}</div></div>`);sh+='</section>'});let ps=[];for(const[id,title]of photos){const l=await get('ph_'+id)||[];if(l.length&&ps.length<6)ps.push([title,l[0].dataUrl])}let ph='';if(ps.length){ph='<section class="rphotos"><h3>現場写真（代表写真）</h3><div class="rpgrid">';ps.forEach(([t,s])=>ph+=`<figure><img src="${s}"><figcaption>${esc(t)}</figcaption></figure>`);ph+='</div></section>'}const d=collect(),logo=await get('logo'),brand=logo?`<img src="${logo.dataUrl}">`:`<div class="textlogo"><small>株式会社</small><strong>ロジック</strong></div>`;document.getElementById('page').innerHTML=`<header class="rhead"><div class="rheadtop"><div class="rlogo">${brand}</div><div class="rtitle">現場調査報告書</div><div class="rcompany">株式会社ロジック</div></div><div class="project-title">${esc(d.site||'工事件名未入力')}</div><div class="meta"><div><b>工事件名：</b>${esc(d.site||'')}</div><div><b>現調日：</b>${esc(d.date||'')}</div><div><b>担当者：</b>${esc(d.staff||'')}</div><div><b>作成日時：</b>${esc(new Date().toLocaleString('ja-JP'))}</div></div></header><div class="cols">${sh||'入力済み項目はありません'}</div>${ph}<div class="note">未入力・未確認項目は省略。写真は代表1枚、最大6枚を掲載しています。</div>`;document.getElementById('form').classList.add('hidden');document.getElementById('report').classList.remove('hidden');scrollTo(0,0)}function back(){document.getElementById('report').classList.add('hidden');document.getElementById('form').classList.remove('hidden');scrollTo(0,0)}function csv(){const d=collect(),rows=[['項目','内容']];Object.entries(d).forEach(([k,v])=>rows.push([k,v===true?'済':v===false?'未':v]));const b=new Blob(['\ufeff'+rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\r\n')],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`${d.date||''}_${(d.site||'現場調査').replace(/[\\/:*?"<>|]/g,'_')}.csv`;a.click();URL.revokeObjectURL(a.href)}
</script></body></html>
