<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#14213d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="現場調査">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>現場調査アプリ Ver.2</title>
<style>
:root{--navy:#14213d;--blue:#2563eb;--green:#059669;--red:#dc2626;--bg:#eef2f6;--card:#fff;--line:#d6dce5;--text:#101828;--muted:#667085}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}
.appbar{position:sticky;top:0;z-index:20;background:var(--navy);color:#fff;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.appbar h1{font-size:18px;margin:0}.appbar small{opacity:.75}
main{max-width:760px;margin:auto;padding:12px}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 5px rgba(0,0,0,.08)}
.card h2{font-size:17px;margin:0 0 12px;border-left:5px solid var(--blue);padding-left:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}
label{display:block;font-size:13px;font-weight:700;margin:0 0 5px}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:16px;background:#fff}
textarea{min-height:76px;resize:vertical}
.checkrow{display:grid;grid-template-columns:24px 1fr 120px;gap:8px;align-items:center;padding:8px;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:7px}
.checkrow input[type=checkbox]{width:21px;height:21px}.checkrow select{font-size:14px;padding:7px}
.photo{border:1px dashed #9aa4b2;border-radius:12px;padding:10px;margin:10px 0}
.preview{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
.preview figure{margin:0}.preview img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:8px;border:1px solid #ddd}.preview figcaption{font-size:10px;word-break:break-all}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0 28px}
button{border:0;border-radius:11px;padding:12px 10px;font-weight:700;font-size:15px}
.primary{background:var(--blue);color:#fff}.secondary{background:#475467;color:#fff}.success{background:var(--green);color:#fff}.danger{background:var(--red);color:#fff}.light{background:#fff;color:#111}
.status{text-align:center;color:var(--muted);font-size:13px;min-height:20px}
.hidden{display:none!important}
.logo img{max-width:220px;max-height:78px;object-fit:contain}
#reportView{min-height:100vh;background:#fff}
.toolbar{position:sticky;top:0;z-index:30;background:var(--navy);padding:10px;display:flex;gap:8px}
.page{max-width:210mm;margin:auto;background:#fff;padding:9mm}
.rhead{border-bottom:2px solid #111;padding-bottom:5px;margin-bottom:6px}
.rtop{display:grid;grid-template-columns:42mm 1fr 42mm;align-items:center;gap:5px}
.rlogo img{max-width:40mm;max-height:14mm;object-fit:contain}.textlogo small{display:block;font-size:7pt}.textlogo strong{font-size:16pt}
.rtitle{text-align:center;font-size:17pt;font-weight:800;writing-mode:horizontal-tb}
.rcompany{text-align:right;font-size:8pt}
.project{margin:5px 0;padding:6px 8px;border:1.5px solid #111;text-align:center;font-size:13pt;font-weight:800;writing-mode:horizontal-tb;word-break:break-word}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:3px 12px;font-size:9pt}
.columns{column-count:2;column-gap:6mm}
.rsec{break-inside:avoid;border:1px solid #999;margin-bottom:4px;font-size:8.8pt}
.rsec h3,.rphotos h3{margin:0;padding:3px 5px;background:#e5e7eb;border-bottom:1px solid #999;font-size:9.5pt}
.rrow{display:grid;grid-template-columns:43% 57%;border-bottom:1px solid #ddd;min-height:19px}.rrow:last-child{border-bottom:0}
.rl{font-weight:700;background:#fafafa;border-right:1px solid #ddd;padding:2px 4px}.rv{padding:2px 4px;overflow-wrap:anywhere}
.rphotos{border:1px solid #999;margin-top:5px}.rpgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2.5mm;padding:2.5mm}
.rpgrid figure{margin:0}.rpgrid img{width:100%;height:40mm;object-fit:cover;border:1px solid #aaa}.rpgrid figcaption{text-align:center;font-size:7.5pt}
.note{font-size:7pt;color:#555;margin-top:4px}
@page{size:A4 portrait;margin:8mm}
@media(max-width:640px){
.grid{grid-template-columns:1fr}.checkrow{grid-template-columns:24px 1fr}.checkrow select{grid-column:2}.actions{grid-template-columns:1fr}
.page{width:100%;padding:12px}.rtop{grid-template-columns:1fr;text-align:center}.rlogo{text-align:center}.rcompany{text-align:center}.meta{grid-template-columns:1fr}
.columns{column-count:1}.rpgrid{grid-template-columns:1fr}.rpgrid img{height:auto;max-height:280px}.rtitle{font-size:21px}.project{font-size:17px}.rsec{font-size:13px}
}
@media print{#formView,.toolbar{display:none!important}#reportView{display:block!important}.page{padding:0;max-width:none}body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>
<body>
<div id="formView">
<header class="appbar"><div><h1>現場調査アプリ Ver.2</h1><small>株式会社ロジック専用</small></div><button id="installBtn" class="light hidden">インストール</button></header>
<main><form id="surveyForm">

<section class="card"><h2>基本情報</h2><div class="grid">
<div class="full"><label for="siteName">工事件名</label><input id="siteName" name="siteName" type="text"></div>
<div><label for="surveyDate">現調日</label><input id="surveyDate" name="surveyDate" type="date"></div>
<div><label for="staff">担当者</label><input id="staff" name="staff" type="text" value="中迫 一斗"></div>
<div><label for="client">立会者</label><input id="client" name="client" type="text"></div>
<div class="full"><label for="address">現場住所</label><input id="address" name="address" type="text"></div>
</div></section>

<section class="card"><h2>会社ロゴ</h2><input id="logoFile" type="file" accept="image/png,image/jpeg,image/webp"><div id="logoPreview" class="logo"></div>
<div class="actions" style="margin-bottom:0"><button type="button" class="primary" onclick="saveLogo()">ロゴ登録</button><button type="button" class="danger" onclick="deleteLogo()">削除</button></div></section>

<section class="card"><h2>駐車・搬入条件</h2><div class="grid">
<div><label for="parkingType">駐車方法</label><select id="parkingType" name="parkingType"><option value="">未確認</option><option>現場内駐車可（無料）</option><option>施設駐車場（無料）</option><option>施設駐車場（有料）</option><option>近隣コインパーキング</option><option>駐車場なし</option><option>要協議</option></select></div>
<div><label for="parkingFee">駐車料金（1日）</label><input id="parkingFee" name="parkingFee" type="number"></div>
<div><label for="sideAccess">現場への横付け</label><select id="sideAccess" name="sideAccess"><option value="">未確認</option><option>横付け可能</option><option>条件付きで可能</option><option>横付け不可</option><option>要協議</option></select></div>
<div><label for="sideDistance">横付け位置から施工場所まで（m）</label><input id="sideDistance" name="sideDistance" type="number"></div>
<div><label for="elevator">エレベーター</label><select id="elevator" name="elevator"><option value="">未確認</option><option>あり・使用可能</option><option>あり・使用不可</option><option>なし</option><option>要協議</option></select></div>
<div><label for="carry">小運搬距離（m）</label><input id="carry" name="carry" type="number"></div>
<div><label for="maxLength">最長搬入材長（m）</label><input id="maxLength" name="maxLength" type="number" step="0.1"></div>
<div><label for="entrance">搬入口寸法</label><input id="entrance" name="entrance" type="text" placeholder="W×H"></div>
</div></section>

<section class="card"><h2>作業可能時間・曜日</h2><div class="grid">
<div><label for="workStart">開始時間</label><input id="workStart" name="workStart" type="time"></div>
<div><label for="workEnd">終了時間</label><input id="workEnd" name="workEnd" type="time"></div>
<div><label for="weekday">平日</label><select id="weekday" name="weekday"><option value="">未確認</option><option>作業可能</option><option>条件付きで可能</option><option>作業不可</option></select></div>
<div><label for="saturday">土曜</label><select id="saturday" name="saturday"><option value="">未確認</option><option>作業可能</option><option>条件付きで可能</option><option>作業不可</option></select></div>
<div><label for="sunday">日曜</label><select id="sunday" name="sunday"><option value="">未確認</option><option>作業可能</option><option>条件付きで可能</option><option>作業不可</option></select></div>
<div><label for="holiday">祝日</label><select id="holiday" name="holiday"><option value="">未確認</option><option>作業可能</option><option>条件付きで可能</option><option>作業不可</option></select></div>
<div class="full"><label for="workMemo">作業条件備考</label><textarea id="workMemo" name="workMemo"></textarea></div>
</div></section>

<section class="card"><h2>電源・水・処分条件</h2><div class="grid">
<div><label for="powerSupply">100V電源供給</label><select id="powerSupply" name="powerSupply"><option value="">未確認</option><option>供給あり</option><option>供給なし</option><option>要協議</option></select></div>
<div><label for="breaker">ブレーカー</label><select id="breaker" name="breaker"><option value="">未確認</option><option>必須</option><option>不要</option><option>施工者で準備</option><option>施設側で準備</option><option>要協議</option></select></div>
<div class="full"><label for="powerMemo">電源備考</label><textarea id="powerMemo" name="powerMemo"></textarea></div>
<div><label for="waterSupply">水道支給</label><select id="waterSupply" name="waterSupply"><option value="">未確認</option><option>支給あり</option><option>支給なし</option><option>要協議</option></select></div>
<div><label for="disposal">廃材・産廃処分</label><select id="disposal" name="disposal"><option value="">未確認</option><option>工事費に含む</option><option>別途工事</option><option>発注者処分</option><option>施工者処分</option><option>要協議</option></select></div>
<div class="full"><label for="utilityMemo">水・処分備考</label><textarea id="utilityMemo" name="utilityMemo"></textarea></div>
</div></section>

<section class="card"><h2>設備・安全</h2>
<div class="checkrow"><input type="checkbox" name="powerCheck"><span>100V電源供給あり</span><select name="powerCheckStatus"><option value="">未確認</option><option>供給あり</option><option>供給なし</option><option>要協議</option></select></div>
<div class="checkrow"><input type="checkbox" name="waterCheck"><span>水道支給あり</span><select name="waterCheckStatus"><option value="">未確認</option><option>支給あり</option><option>支給なし</option><option>要協議</option></select></div>
<div class="checkrow"><input type="checkbox" name="aircon"><span>空調・換気を確認</span><select name="airconStatus"><option value="">未確認</option><option>問題なし</option><option>要協議</option></select></div>
<div class="checkrow"><input type="checkbox" name="thirdParty"><span>利用者・児童・第三者動線</span><select name="thirdPartyStatus"><option value="">未確認</option><option>分離可能</option><option>要対策</option></select></div>
<div class="checkrow"><input type="checkbox" name="toolVehicle"><span>道具車現場横づけ可能</span><select name="toolVehicleStatus"><option value="">未確認</option><option>横づけ可能</option><option>条件付きで可能</option><option>横づけ不可</option><option>要協議</option></select></div>
<label for="safetyMemo">設備・安全備考</label><textarea id="safetyMemo" name="safetyMemo"></textarea>
</section>

<section class="card"><h2>建築・寸法</h2><div class="grid">
<div><label for="floorArea">床面積（㎡）</label><input id="floorArea" name="floorArea" type="number" step="0.01"></div>
<div><label for="wallArea">壁面積（㎡）</label><input id="wallArea" name="wallArea" type="number" step="0.01"></div>
<div><label for="ceilingHeight">天井高さ（mm）</label><input id="ceilingHeight" name="ceilingHeight" type="number"></div>
<div><label for="opening">主要開口寸法</label><input id="opening" name="opening" type="text"></div>
<div class="full"><label for="buildingMemo">既存下地・損傷・納まり</label><textarea id="buildingMemo" name="buildingMemo"></textarea></div>
</div></section>

<section class="card"><h2>協議事項・見積条件</h2>
<label for="questions">確認事項</label><textarea id="questions" name="questions"></textarea>
<label for="estimate">見積反映項目</label><textarea id="estimate" name="estimate"></textarea>
<label for="generalMemo">総合メモ</label><textarea id="generalMemo" name="generalMemo"></textarea>
</section>

<section class="card"><h2>写真</h2><div id="photoAreas"></div></section>

<div id="status" class="status"></div>
<div class="actions">
<button type="button" class="primary" onclick="saveAll()">保存</button>
<button type="button" class="secondary" onclick="loadAll(true)">読込</button>
<button type="button" class="success" onclick="showReport()">報告書表示</button>
<button type="button" class="secondary" onclick="exportCSV()">CSV出力</button>
<button type="button" class="danger" onclick="clearAll()">全消去</button>
</div>
</form></main>
</div>

<div id="reportView" class="hidden"><div class="toolbar"><button class="primary" onclick="window.print()">PDF保存・印刷</button><button class="light" onclick="backToForm()">戻る</button></div><div id="reportPage" class="page"></div></div>

<script>
const form=document.getElementById('surveyForm'),statusEl=document.getElementById('status');
const DB='logicGenbaVer2',STORE='records';
const photoDefs=[['overview','現場全景'],['access','搬入・搬出経路'],['parking','駐車場所・車両進入口'],['ceiling','天井・天井裏'],['wall','壁・開口部'],['floor','床・床下'],['electrical','電源・照明'],['water','水道・配管'],['damage','既存不良・損傷'],['measurement','寸法確認']];
let pendingPhotos={},deferredPrompt=null;
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('surveyDate').value=new Date().toISOString().slice(0,10);buildPhotos();loadAll(false);loadLogo()});
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBtn').classList.remove('hidden')});
document.getElementById('installBtn').onclick=async()=>{if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null}};
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));

function dbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,1);r.onupgradeneeded=()=>r.result.createObjectStore(STORE);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function put(k,v){const db=await dbOpen();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(v,k);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})}
async function get(k){const db=await dbOpen();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly'),r=tx.objectStore(STORE).get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function del(k){const db=await dbOpen();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(k);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})}
function msg(t){statusEl.textContent=t;setTimeout(()=>statusEl.textContent='',3500)}
function buildPhotos(){const c=document.getElementById('photoAreas');photoDefs.forEach(([id,title])=>{c.insertAdjacentHTML('beforeend',`<div class="photo"><label>${title}</label><input id="p_${id}" type="file" accept="image/*" capture="environment" multiple><div id="pv_${id}" class="preview"></div><textarea name="pm_${id}" placeholder="${title}のメモ"></textarea></div>`);document.getElementById('p_'+id).addEventListener('change',e=>previewSelected(id,[...e.target.files]))})}
async function shrink(file){return new Promise((res,rej)=>{const img=new Image(),r=new FileReader();r.onload=()=>img.src=r.result;r.onerror=rej;img.onload=()=>{const max=1400,s=Math.min(1,max/Math.max(img.width,img.height)),cv=document.createElement('canvas');cv.width=Math.round(img.width*s);cv.height=Math.round(img.height*s);cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);res({name:file.name,dataUrl:cv.toDataURL('image/jpeg',.78)})};r.readAsDataURL(file)})}
async function previewSelected(id,files){pendingPhotos[id]=await Promise.all(files.map(shrink));renderPhotos(id,pendingPhotos[id])}
function renderPhotos(id,list){const p=document.getElementById('pv_'+id);p.innerHTML='';(list||[]).forEach(x=>p.insertAdjacentHTML('beforeend',`<figure><img src="${x.dataUrl}"><figcaption>${esc(x.name)}</figcaption></figure>`))}
function collect(){const d={};new FormData(form).forEach((v,k)=>d[k]=v);form.querySelectorAll('input[type=checkbox]').forEach(x=>d[x.name]=x.checked);return d}
function apply(d){Object.entries(d||{}).forEach(([k,v])=>{const e=form.elements[k];if(!e)return;e.type==='checkbox'?e.checked=!!v:e.value=v})}
async function saveAll(){await put('form',collect());for(const[id]of photoDefs){const list=pendingPhotos[id]??await get('photo_'+id)??[];await put('photo_'+id,list)}msg('保存しました')}
async function loadAll(show=true){const d=await get('form');if(d)apply(d);for(const[id]of photoDefs){const list=await get('photo_'+id)||[];pendingPhotos[id]=list;renderPhotos(id,list)}if(show)msg(d?'読み込みました':'保存データはありません')}
async function clearAll(){if(!confirm('全データを消去しますか？'))return;form.reset();document.getElementById('surveyDate').value=new Date().toISOString().slice(0,10);await del('form');await del('logo');for(const[id]of photoDefs){await del('photo_'+id);pendingPhotos[id]=[];renderPhotos(id,[])}document.getElementById('logoPreview').innerHTML='';msg('消去しました')}
async function fileData(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res({name:file.name,dataUrl:r.result});r.onerror=rej;r.readAsDataURL(file)})}
async function saveLogo(){const f=document.getElementById('logoFile').files[0];if(!f)return msg('ロゴを選択してください');const x=await fileData(f);await put('logo',x);renderLogo(x);msg('ロゴを登録しました')}
async function loadLogo(){const x=await get('logo');if(x)renderLogo(x)}
function renderLogo(x){document.getElementById('logoPreview').innerHTML=`<img src="${x.dataUrl}">`}
async function deleteLogo(){await del('logo');document.getElementById('logoPreview').innerHTML='';msg('ロゴを削除しました')}
function meaningful(v){return v!==undefined&&v!==null&&!['','未確認'].includes(String(v).trim())}
function labelOf(e){if(e.id){const l=document.querySelector(`label[for="${e.id}"]`);if(l)return l.textContent.trim()}const r=e.closest('.checkrow');if(r&&r.querySelector('span'))return r.querySelector('span').textContent.trim();return e.name}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
async function showReport(){await saveAll();const sections=[];document.querySelectorAll('#surveyForm>.card').forEach(sec=>{const h=sec.querySelector('h2');if(!h||['会社ロゴ','写真'].includes(h.textContent.trim()))return;const rows=[],used=new Set;sec.querySelectorAll('input,select,textarea').forEach(e=>{if(!e.name||used.has(e.name)||e.type==='file')return;used.add(e.name);if(e.type==='checkbox'){if(e.checked)rows.push([labelOf(e),'該当・確認済'])}else if(meaningful(e.value))rows.push([labelOf(e),e.value])});if(rows.length)sections.push([h.textContent.trim(),rows])});
let body='';sections.forEach(([t,rows])=>{body+=`<section class="rsec"><h3>${esc(t)}</h3>`;rows.forEach(([l,v])=>body+=`<div class="rrow"><div class="rl">${esc(l)}</div><div class="rv">${esc(v).replace(/\n/g,'<br>')}</div></div>`);body+='</section>'});
const logo=await get('logo'),d=collect(),brand=logo?`<img src="${logo.dataUrl}">`:`<div class="textlogo"><small>株式会社</small><strong>ロジック</strong></div>`;
let photos=[];for(const[id,title]of photoDefs){const list=await get('photo_'+id)||[];if(list.length&&photos.length<6)photos.push([title,list[0].dataUrl])}
let ph='';if(photos.length){ph='<section class="rphotos"><h3>現場写真（代表写真）</h3><div class="rpgrid">';photos.forEach(([t,s])=>ph+=`<figure><img src="${s}"><figcaption>${esc(t)}</figcaption></figure>`);ph+='</div></section>'}
document.getElementById('reportPage').innerHTML=`<header class="rhead"><div class="rtop"><div class="rlogo">${brand}</div><div class="rtitle">現場調査報告書</div><div class="rcompany">株式会社ロジック</div></div><div class="project">${esc(d.siteName||'工事件名未入力')}</div><div class="meta"><div><b>現調日：</b>${esc(d.surveyDate||'')}</div><div><b>担当者：</b>${esc(d.staff||'')}</div><div><b>立会者：</b>${esc(d.client||'')}</div><div><b>作成日時：</b>${esc(new Date().toLocaleString('ja-JP'))}</div></div></header><div class="columns">${body}</div>${ph}<div class="note">未入力項目は省略しています。写真は代表写真を最大6枚表示します。</div>`;
document.getElementById('formView').classList.add('hidden');document.getElementById('reportView').classList.remove('hidden');scrollTo(0,0)}
function backToForm(){document.getElementById('reportView').classList.add('hidden');document.getElementById('formView').classList.remove('hidden');scrollTo(0,0)}
function exportCSV(){const d=collect(),rows=[['項目','内容']];Object.entries(d).forEach(([k,v])=>rows.push([k,v===true?'済':v===false?'未':v]));const csv='\ufeff'+rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\r\n'),b=new Blob([csv],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`${d.surveyDate||''}_${(d.siteName||'現場調査').replace(/[\\/:*?"<>|]/g,'_')}.csv`;a.click();URL.revokeObjectURL(a.href)}
